<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Supplier Dashboard - Browse and participate in RFQ auctions">
    <title>RFQ Auction - Supplier Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="supplier-dashboard.html" class="navbar-brand">
            <div class="logo">⚡</div>
            <h1>RFQ Auction</h1>
        </a>
        <div class="navbar-right">
            <div class="navbar-user">Welcome, <span id="user-name">Supplier</span></div>
            <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>🏭 Supplier Dashboard</h1>
            <p>Browse active auctions, join RFQs, and place competitive bids in real-time</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-available">0</div>
                <div class="stat-label">Available RFQs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-joined">0</div>
                <div class="stat-label">Joined RFQs</div>
            </div>
        </div>

        <!-- RFQ Grid -->
        <div class="rfq-grid" id="rfq-grid">
            <!-- Injected by JS -->
        </div>

        <div class="empty-state" id="empty-state" style="display:none">
            <div class="icon">📦</div>
            <h3>No Active Auctions</h3>
            <p>There are currently no active RFQ auctions. Check back later!</p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/supplier.js"></script>
</body>
</html>
